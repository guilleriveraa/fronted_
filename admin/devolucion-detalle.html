<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detalle Devolución - Admin SalamancaVivela</title>
    
    <!-- CoreUI CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@coreui/coreui/dist/css/coreui.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="/fronted/admin/css/admin.css">
    <link rel="stylesheet" href="/fronted/admin/css/devolucion-detalle.css">
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <nav id="sidebar">
            <div class="sidebar-header">
                <h3>Salamanca</h3>
                <p>Panel Administrativo</p>
            </div>
            <ul>
                <li><a href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="productos.html"><i class="fas fa-box"></i> Productos</a></li>
                <li><a href="cupones.html"><i class="fas fa-tag"></i> Cupones</a></li>
                <li><a href="pedidos.html"><i class="fas fa-shopping-cart"></i> Pedidos</a></li>
                <li><a href="devoluciones.html" class="active"><i class="fas fa-undo-alt"></i> Devoluciones</a></li>
                <li><a href="resenas-admin.html"><i class="fas fa-star"></i> Reseñas</a></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a></li>
            </ul>
        </nav>

        <!-- Contenido principal -->
        <div id="content">
            <!-- Cabecera con navegación -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="header-left">
                    <a href="devoluciones.html" class="btn-back">
                        <i class="fas fa-arrow-left"></i> Volver
                    </a>
                    <h2 class="page-title">
                        <i class="fas fa-undo-alt me-2"></i>
                        Detalle de Devolución <span id="returnId" class="return-id">#000</span>
                    </h2>
                </div>
                <div class="admin-info">
                    <span id="adminName" class="fw-bold me-2">Cargando...</span>
                    <img src="https://ui-avatars.com/api/?name=A&background=c62828&color=fff&size=40" class="avatar-sm" id="adminAvatar">
                </div>
            </div>

            <!-- Contenedor principal -->
            <div class="card">
                <div class="card-body">
                    <div id="returnDetailContainer">
                        <!-- El contenido se carga dinámicamente con JavaScript -->
                        <div class="loading-state">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Cargando...</span>
                            </div>
                            <p class="mt-3">Cargando detalles de la devolución...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Botón menú móvil -->
    <button class="btn btn-primary d-md-none position-fixed bottom-0 end-0 m-3 menu-toggle-btn" 
            onclick="document.getElementById('sidebar').classList.toggle('active')">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@coreui/coreui/dist/js/coreui.bundle.min.js"></script>
    <script src="js/admin.js"></script>
    <script>
        // Función de logout
        window.logout = function() {
            localStorage.removeItem('token');
            window.location.href = '../index.html';
        };
    </script>
    <script src="js/devolucion-detalle.js"></script>
</body>
</html>
