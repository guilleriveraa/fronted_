<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Devoluciones - Admin SalamancaVivela</title>

    <!-- CoreUI CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@coreui/coreui/dist/css/coreui.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <nav id="sidebar">
            <div class="sidebar-header">
                <h3>Salamanca</h3>
                <p>Panel Administrativo</p>
            </div>
            <ul>
                <li><a href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="productos.html"><i class="fas fa-box"></i> Productos</a></li>
                <li><a href="cupones.html"><i class="fas fa-tag"></i> Cupones</a></li>
                <li><a href="pedidos.html"><i class="fas fa-shopping-cart"></i> Pedidos</a></li>
                <li><a href="devoluciones.html" class="active"><i class="fas fa-undo-alt"></i> Devoluciones</a></li>
                <li><a href="resenas-admin.html"><i class="fas fa-star"></i> Reseñas</a></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a></li>
            </ul>
        </nav>

        <!-- Contenido principal -->
        <div id="content">
            <!-- Cabecera -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="fas fa-undo-alt me-2" style="color: #c62828;"></i>Gestionar Devoluciones</h2>
                <div>
                    <span id="adminName" class="fw-bold me-2">Cargando...</span>
                    <img src="https://ui-avatars.com/api/?name=A&background=c62828&color=fff&size=40" class="avatar-sm"
                        id="adminAvatar">
                </div>
            </div>

            <!-- Filtros de estado -->
            <div class="filtros-pedidos mb-4">
                <button class="btn-filtro active" data-filtro="todas">Todas</button>
                <button class="btn-filtro" data-filtro="pendiente">Pendientes</button>
                <button class="btn-filtro" data-filtro="aprobada">Aprobadas</button>
                <button class="btn-filtro" data-filtro="rechazada">Rechazadas</button>
                <button class="btn-filtro" data-filtro="completada">Completadas</button>
            </div>

            <!-- Tabla de devoluciones -->
            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Fecha</th>
                                    <th>Cliente</th>
                                    <th>Pedido</th>
                                    <th>Motivo</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="devoluciones-list">
                                <tr>
                                    <td colspan="7" class="text-center">Cargando devoluciones...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Botón menú móvil -->
    <button class="btn btn-primary d-md-none position-fixed bottom-0 end-0 m-3"
        onclick="document.getElementById('sidebar').classList.toggle('active')">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@coreui/coreui/dist/js/coreui.bundle.min.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/devoluciones.js"></script>
    <script>
        // Función de logout
        window.logout = function () {
            localStorage.removeItem('token');
            window.location.href = '/index.html';
        };
    </script>
</body>

</html>
